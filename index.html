                <Etiqueta>🤝 Deudas informales</Etiqueta>
                <ItemLista items={pas.deudasInformales} onChange={v => upPas('deudasInformales', v)}
                  campos={[{key:'descripcion',placeholder:'Descripción',required:true},{key:'monto',placeholder:'Monto',type:'number'}]} />
              </div>
              {(totalActivos > 0 || totalPasivos > 0) && (
                <div style={{ padding: '16px', background: C.surface, borderRadius: '10px', border: `1px solid ${C.border}` }}>
                  <div style={{ fontSize: '13px', fontWeight: 600, marginBottom: '10px' }}>Resumen de tu patrimonio</div>
                  <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr 1fr', gap: '10px', textAlign: 'center' }}>
                    {[['Activos', totalActivos, C.success],['Pasivos', totalPasivos, C.danger],['Net Worth', totalActivos-totalPasivos, totalActivos-totalPasivos >= 0 ? C.accent : C.danger]].map(([l,v,c]) => (
                      <div key={l}><div style={{ fontSize: '11px', color: C.muted }}>{l}</div><div style={{ fontSize: '16px', fontWeight: 700, color: c, fontFamily: 'Fraunces' }}>${v.toLocaleString('es-CL')}</div></div>
                    ))}
                  </div>
                </div>
              )}
            </div>
          )}

          <div style={{ display: 'flex', justifyContent: 'space-between', marginTop: '28px' }}>
            {pasoW > 0 ? <Btn variant="outline" onClick={() => setPasoW(0)}>← Atrás</Btn> : <div />}
            {pasoW === 0
              ? <Btn onClick={() => setPasoW(1)}>Siguiente →</Btn>
              : <Btn onClick={finalizar}>Finalizar y ver mi patrimonio 🎯</Btn>
            }
          </div>
        </Tarjeta>
      </div>
    </div>
  );
}

/* ═══════════════════════════ APP PRINCIPAL ═══════════════════════════ */
function App() {
  const [fase, setFase] = useState('cargando');
  const [paso, setPaso] = useState(0);
  const [activo, setActivo] = useState('panel');
  const [perfil, setPerfil] = useState({
    nombre: '', edad: '', pais: 'Chile', empleo: 'formal', ingreso: '', moneda: 'CLP',
    ingresoAdicional: '', frecuencia: 'mensual', estadoCivil: 'soltero', hijos: '',
    gastos: { arriendo: '', alimentacion: '', transporte: '', electricidad: '', agua: '', gas: '', internet: '', telefono: '', seguro: '', otros: '' },
    metas: [], objetivos: [], ahorro: '', deuda: '', toleranciaRiesgo: 5,
    activos: { cuentasCorrientes: [], depositosPlazo: [], fondosInversion: [], inmuebles: [], vehiculos: [], otros: [] },
    pasivos: { tarjetas: [], creditoHipotecario: null, creditosConsumo: [], deudasEducativas: [], deudasInformales: [] },
  });
  const [txns, setTxns] = useState([]);
  const [metas, setMetas] = useState([]);
  const [proyectos, setProyectos] = useState([]);
  const [chatMsgs, setChatMsgs] = useState([]);

  // Esperar a que Firebase esté listo y detectar sesión
  useEffect(() => {
    const timeout = setTimeout(() => {
      if (typeof window.onAuthStateChanged === 'function' && window.auth) {
        const unsub = window.onAuthStateChanged(window.auth, async (user) => {
          if (user) {
            // Cargar perfil guardado
            try {
              const data = await window.cargarPerfil(user.uid);
              if (data?.perfil && data?.perfilCompletado) {
                setPerfil(prev => ({ ...prev, ...data.perfil }));
                setFase('app');
              } else {
                setFase('onboarding');
              }
            } catch (e) {
              setFase('onboarding');
            }
          } else {
            setFase('auth');
          }
        });
        return () => unsub();
      } else {
        setFase('auth');
      }
    }, 800);
    return () => clearTimeout(timeout);
  }, []);

  // Escuchar transacciones/metas/proyectos en tiempo real cuando hay usuario
  useEffect(() => {
    const uid = window.currentUser?.uid;
    if (!uid || fase !== 'app') return;
    const unsubs = [];
    if (window.escucharTransacciones) unsubs.push(window.escucharTransacciones(uid, setTxns));
    if (window.escucharMetas) unsubs.push(window.escucharMetas(uid, setMetas));
    if (window.escucharProyectos) unsubs.push(window.escucharProyectos(uid, setProyectos));
    return () => unsubs.forEach(u => u && u());
  }, [fase]);

  const completar = async () => {
    const uid = window.currentUser?.uid;
    if (uid) {
      try {
        const perfilConFlags = {
          ...perfil,
          perfilCompletado: true,
          patrimonio_completado: false
        };
        setPerfil(perfilConFlags);
        await window.guardarPerfil?.(uid, perfilConFlags);
      } catch (e) { console.warn(e); }
    }
    setChatMsgs([{ rol: 'asistente', contenido: `¡Hola ${perfil.nombre || 'Usuario'}! 👋 Soy FARO, tu asesor financiero personal. ¿Por dónde empezamos?` }]);
    setFase('app');
  };

  const cerrarSesion = async () => {
    await window.cerrarSesion();
    setFase('auth');
    setTxns([]); setMetas([]); setProyectos([]); setChatMsgs([]);
    setPerfil({ nombre: '', edad: '', pais: 'Chile', empleo: 'formal', ingreso: '', moneda: 'CLP', ingresoAdicional: '', frecuencia: 'mensual', estadoCivil: 'soltero', hijos: '', gastos: {}, metas: [], ahorro: '', deuda: '', toleranciaRiesgo: 5, activos: { cuentasCorrientes: [], depositosPlazo: [], fondosInversion: [], inmuebles: [], vehiculos: [], otros: [] }, pasivos: { tarjetas: [], creditoHipotecario: null, creditosConsumo: [], deudasEducativas: [], deudasInformales: [] } });
  };

  const puntaje = calcPuntaje(perfil, txns);

  // Pantalla de carga
  if (fase === 'cargando') {
    return (
      <div style={{ minHeight: '100vh', background: C.bg, display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
        <div style={{ textAlign: 'center' }}>
          <div style={{ fontFamily: 'Fraunces', fontSize: '48px', fontWeight: 700, color: C.accent, letterSpacing: '-2px', marginBottom: '12px' }}>FARO</div>
          <div style={{ fontSize: '13px', color: C.muted }}>Iniciando...</div>
        </div>
      </div>
    );
  }

  if (fase === 'auth') return <PantallaAuth onSuccess={() => setFase('onboarding')} />;
  if (fase === 'onboarding') return <Onboarding paso={paso} setPaso={setPaso} perfil={perfil} setP={setPerfil} onCompleto={completar} />;

  const pantallas = {
    panel: <Panel perfil={perfil} txns={txns} puntaje={puntaje} setActivo={setActivo} />,
    wizard_patrimonio: <WizardPatrimonio perfil={perfil} setPerfil={setPerfil} onCompletado={() => setActivo('panel')} />,
    transacciones: <Transacciones txns={txns} setTxns={setTxns} perfil={perfil} />,
    asesor: <AsesorIA perfil={perfil} txns={txns} puntaje={puntaje} msgs={chatMsgs} setMsgs={setChatMsgs} />,
    metas: <Metas metas={metas} setMetas={setMetas} perfil={perfil} />,
    proyectos: <ProyectosFinancieros perfil={perfil} proyectos={proyectos} setProyectos={setProyectos} />,
    financiamiento: <ComoFinanciarme perfil={perfil} />,
    impuestos: <MisImpuestos perfil={perfil} />,
    integraciones: <Integraciones />,
    configuracion: <Configuracion perfil={perfil} setPerfil={setPerfil} />,
  };

  return (
    <div style={{ display: 'flex', minHeight: '100vh', background: C.bg, color: C.text }}>
      <BarraLateral activo={activo} setActivo={setActivo} perfil={perfil} puntaje={puntaje} onCerrarSesion={cerrarSesion} />
      <main style={{ flex: 1, overflowY: 'auto', minWidth: 0 }}>{pantallas[activo]}</main>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>

<!-- Service Worker para PWA -->
<script>
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('sw.js')
        .then(reg => console.log('✅ PWA Service Worker registrado. Scope:', reg.scope))
        .catch(err => console.error('❌ Error SW:', err));
    });
  }
</script>
</body>
</html>
