<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.14.1/firebase-app.js";
  import {
    getAuth,
    createUserWithEmailAndPassword,
    signInWithEmailAndPassword,
    onAuthStateChanged,
    signOut
  } from "https://www.gstatic.com/firebasejs/10.14.1/firebase-auth.js";
  import {
    getFirestore,
    doc,
    setDoc,
    getDoc,
    collection,
    addDoc,
    getDocs,
    deleteDoc,
    onSnapshot,
    query,
    orderBy
  } from "https://www.gstatic.com/firebasejs/10.14.1/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyCOuU3uCX-M-MBt5OpP6UcUxjoc4tgSW6s",
    authDomain: "faro-e4410.firebaseapp.com",
    projectId: "faro-e4410",
    storageBucket: "faro-e4410.firebasestorage.app",
    messagingSenderId: "662713689980",
    appId: "1:662713689980:web:b190fbb5cb70c4973026f9"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getFirestore(app);

  console.log("✅ Firebase 10.14.1 inicializado");

  window.auth = auth;
  window.db = db;
  window.currentUser = null;
  window.onAuthStateChanged = onAuthStateChanged;

  // AUTH
  window.registrarUsuario = async (email, password, nombre = "") => {
    const userCredential = await createUserWithEmailAndPassword(auth, email, password);
    await setDoc(doc(db, "usuarios", userCredential.user.uid), {
      email,
      nombre: nombre || email.split('@')[0],
      creado: new Date().toISOString(),
      perfilCompletado: false
    });
    return userCredential.user;
  };

  window.iniciarSesion = async (email, password) => {
    const userCredential = await signInWithEmailAndPassword(auth, email, password);
    return userCredential.user;
  };

  window.cerrarSesion = () => signOut(auth);

  // PERFIL
  window.guardarPerfil = async (uid, perfil) => {
    await setDoc(doc(db, "usuarios", uid), { perfil, perfilCompletado: true }, { merge: true });
  };

  window.guardarPatrimonio = async (uid, patrimonio) => {
    await setDoc(doc(db, "usuarios", uid, "patrimonio", "resumen"), patrimonio, { merge: true });
  };

  window.cargarPerfil = async (uid) => {
    const snap = await getDoc(doc(db, "usuarios", uid));
    return snap.exists() ? snap.data() : null;
  };

  // TRANSACCIONES
  window.guardarTransaccion = async (uid, txn) => {
    const ref = await addDoc(collection(db, "usuarios", uid, "transacciones"), {
      ...txn,
      creadoEn: new Date().toISOString()
    });
    return ref.id;
  };

  window.eliminarTransaccion = async (uid, txnId) => {
    await deleteDoc(doc(db, "usuarios", uid, "transacciones", txnId));
  };

  window.escucharTransacciones = (uid, callback) => {
    const q = query(collection(db, "usuarios", uid, "transacciones"), orderBy("creadoEn", "desc"));
    return onSnapshot(q, (snap) => {
      callback(snap.docs.map(d => ({ id: d.id, ...d.data() })));
    });
  };

  // METAS
  window.guardarMeta = async (uid, meta) => {
    const ref = await addDoc(collection(db, "usuarios", uid, "metas"), meta);
    return ref.id;
  };

  window.actualizarMeta = async (uid, metaId, data) => {
    await setDoc(doc(db, "usuarios", uid, "metas", metaId), data, { merge: true });
  };

  window.eliminarMeta = async (uid, metaId) => {
    await deleteDoc(doc(db, "usuarios", uid, "metas", metaId));
  };

  window.escucharMetas = (uid, callback) => {
    return onSnapshot(collection(db, "usuarios", uid, "metas"), (snap) => {
      callback(snap.docs.map(d => ({ id: d.id, ...d.data() })));
    });
  };

  // PROYECTOS
  window.guardarProyecto = async (uid, proyecto) => {
    const ref = await addDoc(collection(db, "usuarios", uid, "proyectos"), proyecto);
    return ref.id;
  };

  window.eliminarProyecto = async (uid, proyId) => {
    await deleteDoc(doc(db, "usuarios", uid, "proyectos", proyId));
  };

  window.escucharProyectos = (uid, callback) => {
    return onSnapshot(collection(db, "usuarios", uid, "proyectos"), (snap) => {
      callback(snap.docs.map(d => ({ id: d.id, ...d.data() })));
    });
  };

  // LISTENER AUTH
  onAuthStateChanged(auth, (user) => {
    window.currentUser = user;
    if (user) {
      console.log("👤 Usuario logueado:", user.uid);
    } else {
      console.log("No hay usuario logueado");
    }
    window.dispatchEvent(new CustomEvent('authChanged', { detail: user }));
  });
</script>

/* ═══════════════════════════ UTILIDADES ═══════════════════════════ */
const fmt = (n, cur = 'USD') => {
  if (n === undefined || n === null || n === '') return '—';
  const num = Number(n);
  if (cur === 'CLP') return `$${Math.round(num).toLocaleString('es-CL')}`;
  if (cur === 'COP' || cur === 'ARS') return `$${Math.round(num).toLocaleString('es-CO')}`;
  if (cur === 'MXN') return `$${num.toLocaleString('es-MX', { minimumFractionDigits: 0, maximumFractionDigits: 0 })}`;
  return `$${Math.abs(num).toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 })}`;
};

function calcPuntaje(p, txns) {
  const ingreso = +p.ingreso || 0; if (!ingreso) return 0;
  const now = new Date();
  const gastosMes = txns.filter(t => t.tipo === 'gasto' && new Date(t.fecha).getMonth() === now.getMonth()).reduce((s, t) => s + (+t.monto || 0), 0);
  const tasaAhorro = (ingreso - gastosMes) / ingreso;
  const ahorro = +p.ahorro || 0, deuda = +p.deuda || 0;
  let s = 50;
  if (tasaAhorro >= 0.2) s += 20; else if (tasaAhorro >= 0.1) s += 10; else if (tasaAhorro < 0) s -= 20;
  if (ahorro >= ingreso * 6) s += 15; else if (ahorro >= ingreso * 3) s += 8; else if (ahorro < ingreso) s -= 10;
  const dti = deuda / (ingreso * 12 || 1);
  if (dti === 0) s += 15; else if (dti < 0.3) s += 8; else if (dti > 1) s -= 15;
  if ((p.metas || []).length > 0) s += 10;
  return Math.min(100, Math.max(0, Math.round(s)));
}

const nivelInfo = s => s >= 86 ? ['Excelente', '#22D77A'] : s >= 71 ? ['Bueno', '#F0B429'] : s >= 51 ? ['Estable', '#00C896'] : s >= 31 ? ['En Riesgo', '#FB923C'] : ['Crítico', '#FF6B6B'];

function calcImpuestoChile(ingresoAnual, moneda = 'CLP') {
  let ingCLP = ingresoAnual;
  if (moneda === 'USD') ingCLP = ingresoAnual * 900;
  const ingUTM = ingCLP / (UTM_MENSUAL * 12);
  let impuesto = 0, tramo = 'Exento';
  for (const t of TRAMOS_CHILE) {
    if (ingUTM > t.desde) {
      const base = Math.min(ingUTM, t.hasta === Infinity ? ingUTM : t.hasta) - t.desde;
      impuesto += base * (UTM_MENSUAL * 12) * (t.tasa / 100);
      if (ingUTM <= t.hasta) { tramo = t.label; break; }
      tramo = t.label;
    }
  }
  return { impuesto: Math.round(impuesto), tramo, ingCLP, ingUTM: ingUTM.toFixed(2) };
}

/* ═══════════════════════════ PANTALLA AUTH ═══════════════════════════ */
function PantallaAuth({ onSuccess }) {
  const [modo, setModo] = useState('login');
  const [email, setEmail] = useState('');
  const [password, setPassword] = useState('');
  const [nombre, setNombre] = useState('');
  const [cargando, setCargando] = useState(false);
  const [error, setError] = useState('');

  const mensajesError = {
    'auth/email-already-in-use': 'Este correo ya está registrado.',
    'auth/wrong-password': 'Contraseña incorrecta.',
    'auth/invalid-credential': 'Correo o contraseña incorrectos.',
    'auth/user-not-found': 'No existe una cuenta con ese correo.',
    'auth/weak-password': 'La contraseña debe tener al menos 6 caracteres.',
    'auth/invalid-email': 'Correo electrónico inválido.',
    'auth/too-many-requests': 'Demasiados intentos. Espera unos minutos.',
  };

  const manejar = async () => {
    if (!email.trim() || !password.trim()) return;
    setCargando(true); setError('');
    try {
      if (modo === 'registro') {
        await window.registrarUsuario(email.trim(), password, nombre.trim());
      } else {
        await window.iniciarSesion(email.trim(), password);
      }
      onSuccess();
    } catch (err) {
      setError(mensajesError[err.code] || err.message);
    } finally {
      setCargando(false);
    }
  };

  return (
    <div style={{ minHeight: '100vh', background: C.bg, display: 'flex', alignItems: 'center', justifyContent: 'center', padding: '24px' }}>
      <div style={{ position: 'fixed', top: '-100px', right: '-100px', width: '400px', height: '400px', background: `radial-gradient(circle,${C.accentDim} 0%,transparent 70%)`, pointerEvents: 'none' }} />
      <Tarjeta style={{ width: '420px', maxWidth: '100%', padding: '40px 32px', position: 'relative', zIndex: 1 }}>
        <div style={{ textAlign: 'center', marginBottom: '28px' }}>
          <div style={{ fontFamily: 'Fraunces', fontSize: '42px', fontWeight: 700, color: C.accent, letterSpacing: '-2px' }}>FARO</div>
          <div style={{ fontSize: '11px', color: C.muted, letterSpacing: '4px', textTransform: 'uppercase', marginTop: '3px' }}>Co-Piloto Financiero</div>
        </div>

        <div style={{ display: 'flex', gap: '8px', marginBottom: '24px' }}>
          {[['login', 'Iniciar sesión'], ['registro', 'Crear cuenta']].map(([m, l]) => (
            <button key={m} onClick={() => { setModo(m); setError(''); }}
              style={{
                flex: 1, padding: '10px', borderRadius: '8px', border: `1px solid ${modo === m ? C.accent : C.border}`,
                background: modo === m ? C.accentDim : 'transparent', color: modo === m ? C.accent : C.muted,
                fontWeight: 500, fontSize: '13px', cursor: 'pointer', transition: 'all 0.15s'
              }}>{l}</button>
          ))}
        </div>

        <div style={{ display: 'flex', flexDirection: 'column', gap: '12px' }}>
          {modo === 'registro' && (
            <div>
              <Etiqueta>Nombre</Etiqueta>
              <input
                placeholder="Ana García"
                value={nombre}
                onChange={e => setNombre(e.target.value)}
                onKeyDown={e => e.key === 'Enter' && manejar()}
              />
            </div>
          )}
          <div>
            <Etiqueta>Correo electrónico</Etiqueta>
            <input
              type="email"
              placeholder="ana@email.com"
              value={email}
              onChange={e => setEmail(e.target.value)}
              onKeyDown={e => e.key === 'Enter' && manejar()}
              autoComplete="email"
            />
          </div>
          <div>
            <Etiqueta>Contraseña {modo === 'registro' && <span style={{ color: C.dim }}>(mínimo 6 caracteres)</span>}</Etiqueta>
            <input
              type="password"
              placeholder="••••••••"
              value={password}
              onChange={e => setPassword(e.target.value)}
              onKeyDown={e => e.key === 'Enter' && manejar()}
              autoComplete={modo === 'login' ? 'current-password' : 'new-password'}
            />
          </div>

          {error && (
            <div style={{ padding: '10px 14px', background: 'rgba(220,38,38,0.08)', border: '1px solid rgba(220,38,38,0.25)', borderRadius: '8px', fontSize: '13px', color: C.danger, lineHeight: '1.5' }}>
              {error}
            </div>
          )}

          <Btn onClick={manejar} disabled={cargando || !email.trim() || !password.trim()} full style={{ marginTop: '4px' }}>
            {cargando ? 'Procesando...' : modo === 'login' ? 'Entrar a FARO' : 'Crear mi cuenta'}
          </Btn>
        </div>

        <div style={{ marginTop: '20px', padding: '12px', background: C.accentDim, borderRadius: '8px', fontSize: '12px', color: C.muted, lineHeight: '1.6', textAlign: 'center' }}>
          🔒 Tus datos se almacenan de forma segura en Firebase.<br />Solo tú tendrás acceso a tu información.
        </div>
      </Tarjeta>
    </div>
  );
}

function ItemLista({ items, onChange, campos, labelAgregar }) {
  items = items || [];
  labelAgregar = labelAgregar || '+';
  const empty = campos.reduce((a, c) => ({ ...a, [c.key]: '' }), {});
  const [form, setForm] = React.useState(empty);
  const agregar = () => {
    const valido = campos.filter(c => c.required).every(c => (form[c.key]||'').trim());
    if (!valido) return;
    onChange([...items, { ...form, _id: Date.now() }]);
    setForm(empty);
  };
  const quitar = id => onChange(items.filter(i => i._id !== id));
  const cols = campos.map(() => '1fr').join(' ') + ' auto';
  return (
    <div>
      {items.map(item => (
        <div key={item._id} style={{ display: 'flex', alignItems: 'center', gap: '8px', padding: '9px 12px', background: C.surface, borderRadius: '8px', marginBottom: '6px', border: `1px solid ${C.border}`, fontSize: '13px', flexWrap: 'wrap' }}>
          {campos.map(c => (
            <span key={c.key} style={{ flex: 1, color: C.text, minWidth: '80px' }}>
              {c.label && <span style={{ color: C.muted, fontSize: '11px', marginRight: '3px' }}>{c.label}:</span>}
              {c.type === 'number' ? (+item[c.key]||0).toLocaleString('es-CL') : item[c.key]}
            </span>
          ))}
          <button onClick={() => quitar(item._id)} style={{ background: 'none', border: 'none', color: C.danger, cursor: 'pointer', fontSize: '18px', lineHeight: 1, padding: '0 4px', flexShrink: 0 }}>×</button>
        </div>
      ))}
      <div style={{ display: 'grid', gridTemplateColumns: cols, gap: '8px', marginTop: '4px' }}>
        {campos.map(c => (
          <input key={c.key} type={c.type === 'number' ? 'number' : 'text'} placeholder={c.placeholder || c.key}
            value={form[c.key]} onChange={e => setForm(f => ({ ...f, [c.key]: e.target.value }))} style={{ fontSize: '13px' }} />
        ))}
        <button onClick={agregar} style={{ padding: '8px 14px', background: C.accent, color: '#fff', border: 'none', borderRadius: '8px', cursor: 'pointer', fontWeight: 600, fontSize: '13px', whiteSpace: 'nowrap' }}>{labelAgregar}</button>
      </div>
    </div>
  );
}

/* ═══════════════════════════ PANEL PRINCIPAL ═══════════════════════════ */
function Panel({ perfil, txns, puntaje, setActivo }) {
  const now = new Date(), mo = now.getMonth(), yr = now.getFullYear(), cur = perfil.moneda || 'USD';
  const mTxns = txns.filter(t => new Date(t.fecha).getMonth() === mo && new Date(t.fecha).getFullYear() === yr);
  const mIngreso = mTxns.filter(t => t.tipo === 'ingreso').reduce((s, t) => s + (+t.monto || 0), 0);
  const mGasto = mTxns.filter(t => t.tipo === 'gasto').reduce((s, t) => s + (+t.monto || 0), 0);
  const neto = mIngreso - mGasto;
  const tasaAhorro = mIngreso ? Math.round(((mIngreso - mGasto) / mIngreso) * 100) : 0;
  const [nl, nc] = nivelInfo(puntaje);
  const meses = ['Ene', 'Feb', 'Mar', 'Abr', 'May', 'Jun', 'Jul', 'Ago', 'Sep', 'Oct', 'Nov', 'Dic'];

  const eKey = perfil.empleo === 'entrepreneur' ? 'entrepreneur' : perfil.empleo === 'freelance' ? 'freelance' : 'formal';
  const estructura = ESTRUCTURA_RECOMENDADA[eKey];

  const byCat = mTxns.filter(t => t.tipo === 'gasto').reduce((a, t) => { a[t.categoria] = (a[t.categoria] || 0) + (+t.monto || 0); return a; }, {});
  const topCats = Object.entries(byCat).sort((a, b) => b[1] - a[1]).slice(0, 5);
  const maxCat = topCats[0]?.[1] || 1;

  const alertas = [];
  if (tasaAhorro < 10 && mIngreso > 0) alertas.push({ tipo: 'danger', msg: `Tasa de ahorro del ${tasaAhorro}%. Apunta a mínimo 20% para construir patrimonio.` });
  if (tasaAhorro >= 20) alertas.push({ tipo: 'success', msg: `¡Excelente! ${tasaAhorro}% de ahorro. Considera invertir el excedente.` });
  if (+perfil.ahorro < (+perfil.ingreso * 3)) alertas.push({ tipo: 'warning', msg: `Fondo de emergencia menor a 3 meses. Meta: ${fmt((+perfil.ingreso || 0) * 3, cur)}.` });
  if (alertas.length === 0) alertas.push({ tipo: 'info', msg: `Agrega transacciones para obtener alertas personalizadas.` });

  const cAlert = { success: '#22D77A', danger: '#FF6B6B', warning: '#FFB830', info: '#38BDF8' };

  return (
    <div style={{ padding: '28px 32px', maxWidth: '980px', margin: '0 auto' }}>
      {!perfil.patrimonio_completado && (
        <div style={{
          background: `linear-gradient(135deg, ${C.accent}15, ${C.gold}15)`,
          border: `1px solid ${C.accent}40`,
          borderRadius: '12px',
          padding: '20px',
          marginBottom: '24px',
          display: 'flex',
          alignItems: 'center',
          justifyContent: 'space-between',
          gap: '16px',
          flexWrap: 'wrap'
        }}>
          <div style={{ flex: 1, minWidth: '260px' }}>
            <div style={{ fontFamily: 'Fraunces', fontSize: '17px', fontWeight: 600, marginBottom: '4px' }}>
              ✨ Tu plan financiero personalizado te está esperando
            </div>
            <div style={{ fontSize: '13px', color: C.muted, lineHeight: '1.55' }}>
              Completá tu información de Activos y Pasivos (10 minutos) y tu Asesor IA te propondrá metas concretas según tu situación.
            </div>
          </div>
          <Btn onClick={() => setActivo('wizard_patrimonio')}>
            Completar ahora →
          </Btn>
        </div>
      )}
      <div style={{ marginBottom: '26px' }}>
        <div style={{ fontFamily: 'Fraunces', fontSize: '28px', fontWeight: 600 }}>
          {now.getHours() < 12 ? 'Buenos días' : now.getHours() < 17 ? 'Buenas tardes' : 'Buenas noches'}, {perfil.nombre?.split(' ')[0] || ''}
        </div>
        <div style={{ color: C.muted, fontSize: '14px', marginTop: '3px' }}>
          {now.toLocaleDateString('es-CL', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' })}
        </div>
      </div>

      <div style={{ display: 'grid', gridTemplateColumns: 'repeat(4,1fr)', gap: '12px', marginBottom: '20px' }}>
        {[
          { l: 'Ingreso Mensual', v: fmt(mIngreso, cur), s: meses[mo], c: C.text },
          { l: 'Gastos Mensuales', v: fmt(mGasto, cur), s: mGasto > mIngreso ? '⚠️ Déficit' : '✓ Dentro del presupuesto', c: mGasto > mIngreso ? C.danger : C.text },
          { l: 'Flujo Neto', v: fmt(Math.abs(neto), cur), s: `${neto >= 0 ? '+' : '−'}${tasaAhorro}% tasa de ahorro`, c: neto >= 0 ? C.success : C.danger },
          { l: 'Salud Financiera', v: `${puntaje}/100`, s: nl, c: nc },
        ].map(({ l, v, s, c }) => (
          <Tarjeta key={l}>
            <div style={{ fontSize: '11px', color: C.muted, textTransform: 'uppercase', letterSpacing: '1px', marginBottom: '8px' }}>{l}</div>
            <div style={{ fontSize: '22px', fontWeight: 700, color: c, marginBottom: '4px', fontFamily: 'Fraunces' }}>{v}</div>
            <div style={{ fontSize: '12px', color: C.muted }}>{s}</div>
          </Tarjeta>
        ))}
      </div>

      {(() => {
        const act = perfil.activos || {};
        const pas = perfil.pasivos || {};
        const sumA = (arr, k) => (arr||[]).reduce((s,i) => s+(+(i[k]||0)), 0);
        const totalA = sumA(act.cuentasCorrientes,'saldo') + sumA(act.depositosPlazo,'monto') + sumA(act.fondosInversion,'monto') + sumA(act.inmuebles,'valorEstimado') + sumA(act.vehiculos,'valorEstimado') + sumA(act.otros,'monto');
        const totalP = sumA(pas.tarjetas,'deudaActual') + sumA(pas.creditosConsumo,'saldoDeuda') + sumA(pas.deudasEducativas,'saldoDeuda') + sumA(pas.deudasInformales,'monto') + (+(pas.creditoHipotecario?.saldoDeuda||0));
        if (totalA === 0 && totalP === 0) return null;
        const nw = totalA - totalP;
        return (
          <Tarjeta style={{ marginBottom: '16px', background: nw >= 0 ? `linear-gradient(135deg, ${C.card} 0%, ${C.accentDim} 100%)` : C.card }}>
            <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', flexWrap: 'wrap', gap: '16px' }}>
              <div>
                <div style={{ fontSize: '11px', color: C.muted, textTransform: 'uppercase', letterSpacing: '1px', marginBottom: '6px' }}>Patrimonio Neto (Net Worth)</div>
                <div style={{ fontFamily: 'Fraunces', fontSize: '36px', fontWeight: 700, color: nw >= 0 ? C.accent : C.danger }}>{fmt(Math.abs(nw), cur)}</div>
                <div style={{ fontSize: '12px', color: C.muted, marginTop: '4px' }}>{nw >= 0 ? '✅ Balance positivo' : '⚠️ Pasivos superan activos'}</div>
              </div>
              <div style={{ display: 'flex', gap: '24px' }}>
                {[['Activos', totalA, C.success],['Pasivos', totalP, C.danger],['Cobertura', null, totalP > 0 ? (totalA/totalP >= 2 ? C.success : C.warning) : C.success]].map(([l,v,c]) => (
                  <div key={l} style={{ textAlign: 'center' }}>
                    <div style={{ fontSize: '11px', color: C.muted, marginBottom: '4px' }}>{l}</div>
                    <div style={{ fontSize: '18px', fontWeight: 700, color: c, fontFamily: 'Fraunces' }}>
                      {l === 'Cobertura' ? (totalP > 0 ? `${(totalA/totalP).toFixed(1)}x` : '∞') : fmt(v, cur)}
                    </div>
                  </div>
                ))}
              </div>
            </div>
          </Tarjeta>
        );
      })()}

      <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: '16px', marginBottom: '16px' }}>
        <Tarjeta>
          <div style={{ fontSize: '14px', fontWeight: 500, marginBottom: '16px' }}>Principales Gastos — {meses[mo]}</div>
          {topCats.length === 0 ? (
            <div style={{ color: C.muted, fontSize: '13px', padding: '20px 0', textAlign: 'center' }}>
              Sin gastos registrados aún.<br />
              <span onClick={() => setActivo('transacciones')} style={{ color: C.accent, cursor: 'pointer', fontSize: '12px', marginTop: '6px', display: 'inline-block' }}>Agregar transacciones →</span>
            </div>
          ) : topCats.map(([cat, monto]) => (
            <div key={cat} style={{ marginBottom: '11px' }}>
              <div style={{ display: 'flex', justifyContent: 'space-between', fontSize: '13px', marginBottom: '4px' }}>
                <span style={{ color: C.muted }}>{cat}</span>
                <span style={{ fontWeight: 500 }}>{fmt(monto, cur)}</span>
              </div>
              <div style={{ height: '5px', background: C.border, borderRadius: '3px', overflow: 'hidden' }}>
                <div style={{ height: '100%', width: `${(monto / maxCat) * 100}%`, background: `linear-gradient(90deg,${C.accent},${C.gold})`, borderRadius: '3px' }} />
              </div>
            </div>
          ))}
        </Tarjeta>

        <Tarjeta>
          <div style={{ fontSize: '14px', fontWeight: 500, marginBottom: '14px' }}>Alertas y Recomendaciones</div>
          <div style={{ display: 'flex', flexDirection: 'column', gap: '9px' }}>
            {alertas.map((a, i) => (
              <div key={i} style={{ padding: '10px 12px', borderRadius: '8px', fontSize: '13px', lineHeight: '1.5', background: `${cAlert[a.tipo]}10`, border: `1px solid ${cAlert[a.tipo]}30`, color: cAlert[a.tipo] }}>
                {a.tipo === 'success' ? '✅' : a.tipo === 'danger' ? '⚠️' : a.tipo === 'warning' ? '💡' : 'ℹ️'} {a.msg}
              </div>
            ))}
            <button onClick={() => setActivo('asesor')} style={{ padding: '9px', borderRadius: '8px', border: `1px dashed ${C.border}`, background: 'transparent', color: C.muted, fontSize: '12px', cursor: 'pointer', marginTop: '2px' }}>
              ✦ Consultar al Asesor IA →
            </button>
          </div>
        </Tarjeta>
      </div>

      <Tarjeta style={{ marginBottom: '16px' }}>
        <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: '16px' }}>
          <div>
            <div style={{ fontSize: '14px', fontWeight: 500 }}>Estructura Recomendada de Gastos</div>
            <div style={{ fontSize: '12px', color: C.muted, marginTop: '2px' }}>Para tu perfil: {estructura.label} — Ingreso: {fmt(+perfil.ingreso || 0, cur)}/mes</div>
          </div>
        </div>
        <div style={{ display: 'grid', gridTemplateColumns: 'repeat(3,1fr)', gap: '10px' }}>
          {estructura.items.map(item => {
            const montoRecomendado = Math.round((+perfil.ingreso || 0) * item.pct / 100);
            return (
              <div key={item.cat} style={{ padding: '12px', background: C.surface, borderRadius: '10px', border: `1px solid ${C.border}` }}>
                <div style={{ display: 'flex', alignItems: 'center', gap: '7px', marginBottom: '8px' }}>
                  <span style={{ fontSize: '16px' }}>{item.icon}</span>
                  <span style={{ fontSize: '11px', color: C.muted, lineHeight: '1.3' }}>{item.cat}</span>
                </div>
                <div style={{ fontSize: '18px', fontWeight: 700, color: item.color, fontFamily: 'Fraunces' }}>{item.pct}%</div>
                <div style={{ fontSize: '12px', color: C.muted, marginTop: '2px' }}>{fmt(montoRecomendado, cur)}/mes</div>
                <div style={{ height: '3px', background: C.border, borderRadius: '2px', marginTop: '8px', overflow: 'hidden' }}>
                  <div style={{ height: '100%', width: '100%', background: item.color, borderRadius: '2px', opacity: 0.7 }} />
                </div>
              </div>
            );
          })}
        </div>
      </Tarjeta>

      <Tarjeta style={{ padding: 0, overflow: 'hidden' }}>
        <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', padding: '14px 20px', borderBottom: `1px solid ${C.border}` }}>
          <div style={{ fontSize: '14px', fontWeight: 500 }}>Transacciones Recientes</div>
          <button onClick={() => setActivo('transacciones')} style={{ background: 'none', border: 'none', color: C.accent, fontSize: '12px', cursor: 'pointer' }}>Ver todas →</button>
        </div>
        {txns.slice(0, 6).length === 0 ? (
          <div style={{ padding: '40px', textAlign: 'center', color: C.muted, fontSize: '13px' }}>Sin transacciones aún.</div>
        ) : txns.slice(0, 6).map((t, i) => (
          <div key={t.id} style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', padding: '11px 20px', borderBottom: i < 5 ? `1px solid ${C.border}` : 'none' }}>
            <div style={{ display: 'flex', alignItems: 'center', gap: '11px' }}>
              <div style={{ width: '34px', height: '34px', borderRadius: '8px', flexShrink: 0, display: 'flex', alignItems: 'center', justifyContent: 'center', fontSize: '15px', background: t.tipo === 'ingreso' ? 'rgba(34,215,122,0.1)' : 'rgba(255,107,107,0.1)' }}>
                {t.tipo === 'ingreso' ? '↑' : '↓'}
              </div>
              <div>
                <div style={{ fontSize: '13px', fontWeight: 500 }}>{t.desc || t.categoria}</div>
                <div style={{ fontSize: '12px', color: C.muted }}>{t.categoria} · {t.fecha}</div>
              </div>
            </div>
            <div style={{ fontSize: '14px', fontWeight: 600, color: t.tipo === 'ingreso' ? C.success : C.danger }}>
              {t.tipo === 'ingreso' ? '+' : '−'}{fmt(t.monto, t.moneda || cur)}
            </div>
          </div>
        ))}
      </Tarjeta>
    </div>
  );
}

/* ═══════════════════════════ TRANSACCIONES ═══════════════════════════ */
function Transacciones({ txns, setTxns, perfil }) {
  const [mostrarForm, setMostrarForm] = useState(false);
  const [mostrarCartola, setMostrarCartola] = useState(false);
  const [bancoSel, setBancoSel] = useState('bci');
  const [archivo, setArchivo] = useState(null);
  const [subiendo, setSubiendo] = useState(false);
  const [resultadoCartola, setResultadoCartola] = useState(null);

  const subirCartola = async () => {
    if (!archivo || !window.currentUser) return;
    setSubiendo(true); setResultadoCartola(null);
    try {
      const idToken = await window.currentUser.getIdToken();
      const fd = new FormData();
      fd.append('archivo', archivo);
      fd.append('banco', bancoSel);
      fd.append('idToken', idToken);
      const res = await fetch('/api/procesarCartola', { method: 'POST', headers: { 'Authorization': `Bearer ${idToken}` }, body: fd });
      const data = await res.json();
      if (!res.ok) throw new Error(data.error || 'Error al procesar');
      const uid = window.currentUser.uid;
      let importadas = 0;
      for (const tx of (data.transacciones || [])) {
        try { await window.guardarTransaccion(uid, tx); importadas++; } catch {}
      }
      setResultadoCartola({ ok: true, total: data.transacciones?.length || 0, importadas });
      setArchivo(null);
    } catch (err) {
      setResultadoCartola({ ok: false, error: err.message });
    } finally { setSubiendo(false); }
  };

  const [filtro, setFiltro] = useState('todos');
  const [form, setForm] = useState({ tipo: 'gasto', monto: '', categoria: '', desc: '', fecha: new Date().toISOString().split('T')[0] });
  const [guardando, setGuardando] = useState(false);
  const cur = perfil.moneda || 'USD';
  const uid = window.currentUser?.uid;

  const agregar = async () => {
    if (!form.monto || !form.categoria) return;
    setGuardando(true);
    const nueva = { ...form, id: Date.now() + '', monto: +form.monto, moneda: cur };
    try {
      if (uid && window.guardarTransaccion) {
        const docId = await window.guardarTransaccion(uid, nueva);
        nueva.id = docId;
      }
      setTxns(p => [nueva, ...p]);
      setForm({ tipo: 'gasto', monto: '', categoria: '', desc: '', fecha: new Date().toISOString().split('T')[0] });
      setMostrarForm(false);
    } finally {
      setGuardando(false);
    }
  };

  const eliminar = async (id) => {
    if (uid && window.eliminarTransaccion) {
      try { await window.eliminarTransaccion(uid, id); } catch (e) { console.warn(e); }
    }
    setTxns(p => p.filter(x => x.id !== id));
  };

  const filtradas = txns.filter(t => filtro === 'todos' || t.tipo === filtro);
  const totIng = txns.filter(t => t.tipo === 'ingreso').reduce((s, t) => s + (+t.monto || 0), 0);
  const totGas = txns.filter(t => t.tipo === 'gasto').reduce((s, t) => s + (+t.monto || 0), 0);

  return (
    <div style={{ padding: '28px 32px', maxWidth: '820px', margin: '0 auto' }}>
      <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'flex-start', marginBottom: '22px' }}>
        <div>
          <div style={{ fontFamily: 'Fraunces', fontSize: '26px', fontWeight: 600 }}>Transacciones</div>
          <div style={{ color: C.muted, fontSize: '14px', marginTop: '4px' }}>{txns.length} registros · <span style={{ color: C.success }}>+{fmt(totIng, cur)}</span> · <span style={{ color: C.danger }}>−{fmt(totGas, cur)}</span></div>
        </div>
        <div style={{ display: 'flex', gap: '8px' }}>
            <button onClick={() => setMostrarCartola(true)} style={{ padding: '9px 16px', borderRadius: '8px', border: `1px solid ${C.border}`, background: C.surface, color: C.muted, fontSize: '13px', cursor: 'pointer' }}>📄 Subir cartola</button>
            <button onClick={() => setMostrarForm(true)} style={{ padding: '9px 18px', borderRadius: '8px', border: 'none', background: C.accent, color: '#fff', fontSize: '13px', fontWeight: 500, cursor: 'pointer' }}>+ Agregar</button>
          </div>
      </div>
      <div style={{ display: 'flex', gap: '8px', marginBottom: '18px' }}>
        {[['todos', 'Todos'], ['ingreso', 'Ingresos'], ['gasto', 'Gastos']].map(([f, l]) => (
          <button key={f} onClick={() => setFiltro(f)} style={{ padding: '7px 18px', borderRadius: '20px', fontSize: '13px', fontWeight: 500, border: 'none', cursor: 'pointer', background: filtro === f ? C.accent : C.card, color: filtro === f ? '#FFFFFF' : C.muted }}>{l}</button>
        ))}
      </div>
      <Tarjeta style={{ padding: 0, overflow: 'hidden' }}>
        {filtradas.length === 0 ? (
          <div style={{ padding: '48px', textAlign: 'center', color: C.muted, fontSize: '13px' }}>Sin transacciones. Haz clic en "+ Agregar" para comenzar.</div>
        ) : filtradas.map((t, i) => (
          <div key={t.id} style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', padding: '13px 20px', borderBottom: i < filtradas.length - 1 ? `1px solid ${C.border}` : 'none' }}>
            <div style={{ display: 'flex', alignItems: 'center', gap: '11px' }}>
              <div style={{ width: '36px', height: '36px', borderRadius: '8px', display: 'flex', alignItems: 'center', justifyContent: 'center', fontSize: '16px', flexShrink: 0, background: t.tipo === 'ingreso' ? 'rgba(34,215,122,0.1)' : 'rgba(255,107,107,0.1)' }}>
                {t.tipo === 'ingreso' ? '↑' : '↓'}
              </div>
              <div>
                <div style={{ fontSize: '13px', fontWeight: 500 }}>{t.desc || t.categoria}</div>
                <div style={{ fontSize: '12px', color: C.muted }}>{t.categoria} · {t.fecha}</div>
              </div>
            </div>
            <div style={{ display: 'flex', alignItems: 'center', gap: '12px' }}>
              <div style={{ fontSize: '14px', fontWeight: 600, color: t.tipo === 'ingreso' ? C.success : C.danger }}>
                {t.tipo === 'ingreso' ? '+' : '−'}{fmt(t.monto, t.moneda || cur)}
              </div>
              <button onClick={() => eliminar(t.id)} style={{ background: 'none', border: 'none', color: C.dim, fontSize: '18px', cursor: 'pointer', lineHeight: 1 }}>×</button>
            </div>
          </div>
        ))}
      </Tarjeta>

      {mostrarForm && (
        <div style={{ position: 'fixed', inset: 0, background: 'rgba(0,0,0,0.7)', display: 'flex', alignItems: 'center', justifyContent: 'center', zIndex: 200 }} onClick={e => e.target === e.currentTarget && setMostrarForm(false)}>
          <Tarjeta style={{ width: '440px', maxWidth: '95vw', padding: '28px' }}>
            <div style={{ fontFamily: 'Fraunces', fontSize: '20px', fontWeight: 600, marginBottom: '18px' }}>Nueva Transacción</div>
            <div style={{ display: 'flex', gap: '8px', marginBottom: '14px' }}>
              {[['gasto', 'Gasto'], ['ingreso', 'Ingreso']].map(([t, l]) => (
                <button key={t} onClick={() => setForm(f => ({ ...f, tipo: t, categoria: '' }))} style={{ flex: 1, padding: '9px', borderRadius: '8px', border: 'none', cursor: 'pointer', fontSize: '13px', fontWeight: 500, background: form.tipo === t ? (t === 'ingreso' ? 'rgba(34,215,122,0.15)' : 'rgba(255,107,107,0.15)') : C.surface, color: form.tipo === t ? (t === 'ingreso' ? C.success : C.danger) : C.muted }}>{l}</button>
              ))}
            </div>
            <div style={{ display: 'flex', flexDirection: 'column', gap: '11px' }}>
              <input type="number" placeholder={`Monto (${cur})`} value={form.monto} onChange={e => setForm(f => ({ ...f, monto: e.target.value }))} />
              <select value={form.categoria} onChange={e => setForm(f => ({ ...f, categoria: e.target.value }))}>
                <option value="">Seleccionar categoría...</option>
                {CATS[form.tipo].map(c => <option key={c}>{c}</option>)}
              </select>
              <input placeholder="Descripción (opcional)" value={form.desc} onChange={e => setForm(f => ({ ...f, desc: e.target.value }))} />
              <input type="date" value={form.fecha} onChange={e => setForm(f => ({ ...f, fecha: e.target.value }))} />
              <div style={{ display: 'flex', gap: '10px', marginTop: '4px' }}>
                <Btn full onClick={agregar} disabled={!form.monto || !form.categoria || guardando} style={{ flex: 1 }}>{guardando ? 'Guardando...' : 'Guardar'}</Btn>
                <Btn variant="outline" onClick={() => setMostrarForm(false)} style={{ flex: 1 }}>Cancelar</Btn>
              </div>
            </div>
          </Tarjeta>
        </div>
      )}

      {mostrarCartola && (
        <div style={{ position: 'fixed', inset: 0, background: 'rgba(0,0,0,0.5)', display: 'flex', alignItems: 'center', justifyContent: 'center', zIndex: 999, padding: '24px' }}>
          <Tarjeta style={{ width: '100%', maxWidth: '480px', padding: '28px' }}>
            <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: '20px' }}>
              <div style={{ fontFamily: 'Fraunces', fontSize: '20px', fontWeight: 600 }}>Importar cartola</div>
              <button onClick={() => { setMostrarCartola(false); setResultadoCartola(null); setArchivo(null); }} style={{ background: 'none', border: 'none', cursor: 'pointer', fontSize: '22px', color: C.muted }}>×</button>
            </div>
            {!resultadoCartola ? (
              <div style={{ display: 'flex', flexDirection: 'column', gap: '14px' }}>
                <div>
                  <Etiqueta>Banco</Etiqueta>
                  <select value={bancoSel} onChange={e => setBancoSel(e.target.value)}>
                    {[['bci','BCI'],['bancochile','Banco de Chile'],['santander','Santander'],['bancoestado','BancoEstado'],['scotiabank','Scotiabank'],['itau','Itaú'],['falabella','Banco Falabella'],['otro','Otro']].map(([v,l]) => <option key={v} value={v}>{l}</option>)}
                  </select>
                </div>
                <div>
                  <Etiqueta>Archivo (Excel .xlsx o PDF)</Etiqueta>
                  <input type="file" accept=".xlsx,.xls,.pdf" onChange={e => setArchivo(e.target.files[0])}
                    style={{ padding: '8px', border: `1px solid ${C.border}`, borderRadius: '8px', width: '100%', background: C.surface, color: C.text, fontSize: '13px', boxSizing: 'border-box' }} />
                  {archivo && <div style={{ fontSize: '12px', color: C.muted, marginTop: '4px' }}>📎 {archivo.name} ({(archivo.size/1024).toFixed(0)} KB)</div>}
                </div>
                <div style={{ padding: '12px', background: C.surface, borderRadius: '8px', fontSize: '12px', color: C.muted, lineHeight: '1.6' }}>
                  💡 Descarga tu cartola desde la banca en línea de tu banco en formato Excel. FARO la procesará automáticamente e importará las transacciones.
                </div>
                <Btn onClick={subirCartola} disabled={!archivo || subiendo} full>
                  {subiendo ? '⏳ Procesando cartola...' : 'Procesar e importar'}
                </Btn>
              </div>
            ) : resultadoCartola.ok ? (
              <div style={{ textAlign: 'center', padding: '20px 0' }}>
                <div style={{ fontSize: '48px', marginBottom: '12px' }}>✅</div>
                <div style={{ fontFamily: 'Fraunces', fontSize: '22px', fontWeight: 600, marginBottom: '8px' }}>¡Cartola importada!</div>
                <div style={{ color: C.muted, fontSize: '14px' }}>{resultadoCartola.importadas} de {resultadoCartola.total} transacciones importadas</div>
                <Btn onClick={() => { setMostrarCartola(false); setResultadoCartola(null); }} style={{ marginTop: '20px' }}>Cerrar</Btn>
              </div>
            ) : (
              <div style={{ textAlign: 'center', padding: '20px 0' }}>
                <div style={{ fontSize: '48px', marginBottom: '12px' }}>❌</div>
                <div style={{ color: C.danger, fontSize: '14px', marginBottom: '16px' }}>{resultadoCartola.error}</div>
                <Btn variant="outline" onClick={() => setResultadoCartola(null)}>Intentar de nuevo</Btn>
              </div>
            )}
          </Tarjeta>
        </div>
      )}
    </div>
  );
}

/* ═══════════════════════════ ASESOR IA ═══════════════════════════ */
function AsesorIA({ perfil, txns, puntaje, msgs, setMsgs }) {
  const [input, setInput] = useState('');
  const [cargando, setCargando] = useState(false);
  const finRef = useRef(null);
  const cur = perfil.moneda || 'USD';

  useEffect(() => finRef.current?.scrollIntoView({ behavior: 'smooth' }), [msgs]);

  const enviar = async () => {
    if (!input.trim() || cargando) return;
    const msg = input.trim(); setInput('');
    setMsgs(p => [...p, { rol: 'usuario', contenido: msg }]);
    setCargando(true);

    try {
      if (!window.currentUser) throw new Error('Sin sesión activa');
      const idToken = await window.currentUser.getIdToken();
      const historial = msgs.slice(-8).map(m => ({
        role: m.rol === 'usuario' ? 'user' : 'assistant',
        content: m.contenido
      }));
      const res = await fetch('/api/asistente', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${idToken}` },
        body: JSON.stringify({ mensaje: msg, historial, idToken })
      });
      let data = {};
      try { data = await res.json(); } catch { console.error('Respuesta no-JSON del servidor, status:', res.status); }
      if (!res.ok) {
        const errMsg = data.mensaje || (res.status === 403 ? 'Activa tu plan FARO para usar el Asesor IA.' : res.status === 404 ? 'Función no encontrada (revisa el deploy).' : 'Error al conectar con el asesor. Intenta nuevamente.');
        setMsgs(p => [...p, { rol: 'asistente', contenido: errMsg }]);
      } else {
        setMsgs(p => [...p, { rol: 'asistente', contenido: data.respuesta }]);
      }
    } catch (err) {
      console.error('Error en enviar():', err);
      setMsgs(p => [...p, { rol: 'asistente', contenido: 'Error de conexión. Intenta nuevamente.' }]);
    } finally {
      setCargando(false);
    }
  };

  const sugerencias = ['¿Cuáles son mis fugas financieras?', '¿Debo pagar deuda o invertir primero?', 'Dame un plan de acción de 90 días', '¿Cuánto necesito en el fondo de emergencia?', '¿Cómo mejorar mi puntaje financiero?'];

  return (
    <div style={{ display: 'flex', flexDirection: 'column', height: '100vh', maxWidth: '740px', padding: '0 32px', margin: '0 auto' }}>
      <div style={{ padding: '26px 0 14px', borderBottom: `1px solid ${C.border}`, flexShrink: 0 }}>
        <div style={{ fontFamily: 'Fraunces', fontSize: '24px', fontWeight: 600 }}>Asesor IA</div>
        <div style={{ color: C.muted, fontSize: '13px', marginTop: '2px' }}>
          Asesoría personalizada basada en tu perfil real
        </div>
      </div>
      <div style={{ flex: 1, overflowY: 'auto', padding: '18px 0', display: 'flex', flexDirection: 'column', gap: '14px' }}>
        {msgs.map((m, i) => (
          <div key={i} style={{ display: 'flex', justifyContent: m.rol === 'usuario' ? 'flex-end' : 'flex-start' }}>

        <div style={{ paddingBottom: '10px', flexShrink: 0 }}>

            {sugerencias.map(s => (
              <button key={s} onClick={() => setInput(s)} style={{ padding: '6px 13px', borderRadius: '20px', border: `1px solid ${C.border}`, background: C.surface, color: C.muted, fontSize: '12px', cursor: 'pointer' }}>{s}</button>

        <div style={{ display: 'flex', gap: '10px' }}>
          <input
            placeholder="Escribe tu consulta financiera..."
            value={input} onChange={e => setInput(e.target.value)}
            onKeyDown={e => e.key === 'Enter' && !cargando && enviar()}
          />
          <button onClick={enviar} disabled={cargando || !input.trim()} style={{ padding: '10px 20px', background: C.accent, border: 'none', borderRadius: '8px', color: '#FFFFFF', fontWeight: 600, fontSize: '14px', flexShrink: 0, opacity: cargando || !input.trim() ? 0.4 : 1 }}>Enviar</button>
        </div>
      </div>
    </div>
  );
}

/* ═══════════════════════════ METAS ═══════════════════════════ */
function Metas({ metas, setMetas, perfil }) {
  const [mostrar, setMostrar] = useState(false);
  const [form, setForm] = useState({ metaId: 'emergencia', objetivo: '', ahorrado: '', fecha: '' });
  const cur = perfil.moneda || 'USD';
  const uid = window.currentUser?.uid;

  const agregar = async () => {
    if (!form.objetivo || +form.objetivo <= 0) return;
    const opt = METAS_OPT.find(g => g.id === form.metaId);
    const meta = { id: form.metaId + Date.now(), label: opt?.label, icon: opt?.icon, color: opt?.color, objetivo: +form.objetivo, ahorrado: +form.ahorrado || 0, fecha: form.fecha };
    if (uid && window.guardarMeta) {
      try { await window.guardarMeta(uid, meta); } catch (e) { console.warn(e); }
    }
    setMetas(p => [...p, meta]);
    setForm({ metaId: 'emergencia', objetivo: '', ahorrado: '', fecha: '' });
    setMostrar(false);
  };

  const eliminar = async (id) => {
    if (uid && window.eliminarMeta) {
      try { await window.eliminarMeta(uid, id); } catch (e) { console.warn(e); }
    }
    setMetas(p => p.filter(x => x.id !== id));
  };

  const abonar = async (id, monto) => {
    const nuevas = metas.map(x => x.id === id ? { ...x, ahorrado: Math.min(x.objetivo, (+x.ahorrado || 0) + monto) } : x);
    if (uid && window.actualizarMeta) {
      const meta = nuevas.find(x => x.id === id);
      try { await window.actualizarMeta(uid, id, { ahorrado: meta.ahorrado }); } catch (e) { console.warn(e); }
    }
    setMetas(nuevas);
  };

  return (
    <div style={{ padding: '28px 32px', maxWidth: '820px', margin: '0 auto' }}>
      <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'flex-start', marginBottom: '26px' }}>
        <div>
          <div style={{ fontFamily: 'Fraunces', fontSize: '26px', fontWeight: 600 }}>Mis Metas</div>
          <div style={{ color: C.muted, fontSize: '14px', marginTop: '4px' }}>{metas.length} meta{metas.length !== 1 ? 's' : ''} activa{metas.length !== 1 ? 's' : ''}</div>
        </div>
        <Btn onClick={() => setMostrar(true)}>+ Nueva Meta</Btn>
      </div>
      <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: '16px' }}>
        {metas.map(g => {
          const ptc = g.objetivo ? Math.min(100, Math.round((+g.ahorrado / +g.objetivo) * 100)) : 0;
          const faltante = Math.max(0, +g.objetivo - (+g.ahorrado || 0));
          const mesesFalt = +perfil.ingreso && faltante ? Math.ceil(faltante / (+perfil.ingreso * 0.1)) : null;
          return (
            <Tarjeta key={g.id}>
              <div style={{ display: 'flex', justifyContent: 'space-between', marginBottom: '14px' }}>
                <div style={{ display: 'flex', alignItems: 'center', gap: '10px' }}>
                  <span style={{ fontSize: '26px' }}>{g.icon}</span>
                  <div>
                    <div style={{ fontSize: '15px', fontWeight: 500 }}>{g.label}</div>
                    {g.fecha && <div style={{ fontSize: '12px', color: C.muted }}>Meta: {g.fecha}</div>}
                  </div>
                </div>
                <button onClick={() => eliminar(g.id)} style={{ background: 'none', border: 'none', color: C.dim, fontSize: '20px', cursor: 'pointer' }}>×</button>
              </div>
              <div style={{ display: 'flex', justifyContent: 'space-between', fontSize: '13px', marginBottom: '5px' }}>
                <span style={{ color: C.muted }}>Progreso</span>
                <span style={{ fontWeight: 600, color: g.color }}>{ptc}%</span>
              </div>
              <div style={{ height: '6px', background: C.border, borderRadius: '3px', overflow: 'hidden', marginBottom: '10px' }}>
                <div style={{ height: '100%', width: `${ptc}%`, background: g.color, borderRadius: '3px', transition: 'width 0.5s' }} />
              </div>
              <div style={{ display: 'flex', justifyContent: 'space-between', fontSize: '12px', color: C.muted, marginBottom: '8px' }}>
                <span>Ahorrado: <strong style={{ color: C.text }}>{fmt(g.ahorrado || 0, cur)}</strong></span>
                <span>Meta: <strong style={{ color: C.text }}>{fmt(g.objetivo, cur)}</strong></span>
              </div>
              {mesesFalt && ptc < 100 && <div style={{ fontSize: '12px', color: C.muted, marginBottom: '9px' }}>~{mesesFalt} meses al 10% de ahorro mensual</div>}
              {ptc >= 100 && <div style={{ fontSize: '12px', color: C.success, fontWeight: 500, marginBottom: '9px' }}>🎉 ¡Meta alcanzada!</div>}
              <div style={{ display: 'flex', gap: '8px' }}>
                <input type="number" placeholder="Agregar ahorro..." style={{ flex: 1, padding: '7px 10px', fontSize: '12px' }}
                  onKeyDown={e => { if (e.key === 'Enter' && +e.target.value > 0) { abonar(g.id, +e.target.value); e.target.value = ''; } }} />
                <button onClick={e => { const inp = e.currentTarget.previousSibling; if (+inp.value > 0) { abonar(g.id, +inp.value); inp.value = ''; } }} style={{ padding: '7px 12px', background: C.accentDim, border: `1px solid ${C.accent}40`, borderRadius: '6px', color: C.accent, fontSize: '12px', cursor: 'pointer', flexShrink: 0 }}>+Agregar</button>
              </div>
            </Tarjeta>
          );
        })}
        {metas.length === 0 && (
          <Tarjeta style={{ gridColumn: '1/-1', textAlign: 'center', padding: '52px' }}>
            <div style={{ fontSize: '40px', marginBottom: '12px' }}>🎯</div>
            <div style={{ fontSize: '16px', fontWeight: 500, marginBottom: '8px', fontFamily: 'Fraunces' }}>Sin metas definidas</div>
            <div style={{ color: C.muted, fontSize: '13px', marginBottom: '22px' }}>Define tus objetivos financieros y lleva un seguimiento de tu progreso</div>
            <Btn onClick={() => setMostrar(true)}>Crear mi primera meta</Btn>
          </Tarjeta>
        )}
      </div>
      {mostrar && (
        <div style={{ position: 'fixed', inset: 0, background: 'rgba(0,0,0,0.7)', display: 'flex', alignItems: 'center', justifyContent: 'center', zIndex: 200 }} onClick={e => e.target === e.currentTarget && setMostrar(false)}>
          <Tarjeta style={{ width: '420px', maxWidth: '95vw', padding: '28px' }}>
            <div style={{ fontFamily: 'Fraunces', fontSize: '20px', fontWeight: 600, marginBottom: '18px' }}>Nueva Meta</div>
            <div style={{ display: 'flex', flexDirection: 'column', gap: '11px' }}>
              <div><Etiqueta>Tipo de meta</Etiqueta>
                <select value={form.metaId} onChange={e => setForm(f => ({ ...f, metaId: e.target.value }))}>
                  {METAS_OPT.map(g => <option key={g.id} value={g.id}>{g.icon} {g.label}</option>)}
                </select>
              </div>
              <div><Etiqueta>Monto objetivo ({cur}) *</Etiqueta><input type="number" placeholder="10000" value={form.objetivo} onChange={e => setForm(f => ({ ...f, objetivo: e.target.value }))} /></div>
              <div><Etiqueta>Ya ahorrado ({cur})</Etiqueta><input type="number" placeholder="0" value={form.ahorrado} onChange={e => setForm(f => ({ ...f, ahorrado: e.target.value }))} /></div>
              <div><Etiqueta>Fecha objetivo (opcional)</Etiqueta><input type="month" value={form.fecha} onChange={e => setForm(f => ({ ...f, fecha: e.target.value }))} /></div>
              <div style={{ display: 'flex', gap: '10px', marginTop: '6px' }}>
                <Btn onClick={agregar} style={{ flex: 1 }} disabled={!form.objetivo || +form.objetivo <= 0}>Crear Meta</Btn>
                <Btn variant="outline" onClick={() => setMostrar(false)} style={{ flex: 1 }}>Cancelar</Btn>
              </div>
            </div>
          </Tarjeta>
        </div>
      )}
    </div>
  );
}

/* ═══════════════════════════ PROYECTOS ═══════════════════════════ */
function ProyectosFinancieros({ perfil, proyectos, setProyectos }) {
  const [mostrar, setMostrar] = useState(false);
  const [form, setForm] = useState({ tipoId: 'casa', nombre: '', costo: '', ahorroActual: '', plazo: '', tasaEsperada: 6 });
  const cur = perfil.moneda || 'USD';
  const uid = window.currentUser?.uid;

  const calcProyeccion = (costo, ahorroActual, plazo, tasa) => {
    const faltante = Math.max(0, costo - ahorroActual);
    const meses = parseInt(plazo) || 0;
    if (!meses) return null;
    const ahorroMensualSimple = Math.ceil(faltante / meses);
    const r = (tasa / 100) / 12;
    const ahorroMensualInv = r > 0 ? Math.ceil(faltante * (r * Math.pow(1 + r, meses)) / (Math.pow(1 + r, meses) - 1)) : ahorroMensualSimple;
    const ing = +perfil.ingreso || 0;
    const escenarios = [10, 15, 20].map(pct => {
      const ahorroMens = ing * pct / 100;
      const mesesNeed = r > 0 ? Math.ceil(Math.log(1 + (faltante * r) / ahorroMens) / Math.log(1 + r)) : Math.ceil(faltante / ahorroMens);
      return { pct, ahorroMens: Math.round(ahorroMens), meses: isFinite(mesesNeed) ? mesesNeed : 999 };
    });
    return { faltante, ahorroMensualSimple, ahorroMensualInv, escenarios };
  };

  const agregar = async () => {
    if (!form.costo || +form.costo <= 0) return;
    const tipo = PROYECTOS_TIPOS.find(t => t.id === form.tipoId);
    const proy = { id: form.tipoId + Date.now(), tipoId: form.tipoId, nombre: form.nombre || tipo.label, icon: tipo.icon, color: tipo.color, costo: +form.costo, ahorroActual: +form.ahorroActual || 0, plazo: form.plazo, tasaEsperada: +form.tasaEsperada || 6, creado: new Date().toISOString().split('T')[0] };
    if (uid && window.guardarProyecto) {
      try { await window.guardarProyecto(uid, proy); } catch (e) { console.warn(e); }
    }
    setProyectos(p => [...p, proy]);
    setForm({ tipoId: 'casa', nombre: '', costo: '', ahorroActual: '', plazo: '', tasaEsperada: 6 });
    setMostrar(false);
  };

  const eliminar = async (id) => {
    if (uid && window.eliminarProyecto) {
      try { await window.eliminarProyecto(uid, id); } catch (e) { console.warn(e); }
    }
    setProyectos(prev => prev.filter(x => x.id !== id));
  };

  return (
    <div style={{ padding: '28px 32px', maxWidth: '900px', margin: '0 auto' }}>
      <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'flex-start', marginBottom: '26px' }}>
        <div>
          <div style={{ fontFamily: 'Fraunces', fontSize: '26px', fontWeight: 600 }}>Proyectos Financieros</div>
          <div style={{ color: C.muted, fontSize: '14px', marginTop: '4px' }}>Simula, planifica y proyecta tus grandes compras y metas</div>
        </div>
        <Btn onClick={() => setMostrar(true)}>+ Nuevo Proyecto</Btn>
      </div>
      {proyectos.length === 0 && (
        <Tarjeta style={{ textAlign: 'center', padding: '52px' }}>
          <div style={{ fontSize: '44px', marginBottom: '14px' }}>🏗️</div>
          <div style={{ fontFamily: 'Fraunces', fontSize: '18px', fontWeight: 600, marginBottom: '8px' }}>Sin proyectos aún</div>
          <div style={{ color: C.muted, fontSize: '13px', marginBottom: '22px' }}>Crea un proyecto para simular cómo financiar tu próxima gran compra</div>
          <Btn onClick={() => setMostrar(true)}>Crear primer proyecto</Btn>
        </Tarjeta>
      )}
      <div style={{ display: 'flex', flexDirection: 'column', gap: '16px' }}>
        {proyectos.map(p => {
          const proy = calcProyeccion(p.costo, p.ahorroActual, p.plazo, p.tasaEsperada);
          const ptc = p.costo ? Math.min(100, Math.round((p.ahorroActual / p.costo) * 100)) : 0;
          return (
            <Tarjeta key={p.id}>
              <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'flex-start', marginBottom: '16px' }}>
                <div style={{ display: 'flex', alignItems: 'center', gap: '12px' }}>
                  <div style={{ width: '48px', height: '48px', borderRadius: '12px', background: `${p.color}18`, border: `1px solid ${p.color}30`, display: 'flex', alignItems: 'center', justifyContent: 'center', fontSize: '24px' }}>{p.icon}</div>
                  <div>
                    <div style={{ fontSize: '16px', fontWeight: 600, fontFamily: 'Fraunces' }}>{p.nombre}</div>
                    <div style={{ fontSize: '12px', color: C.muted }}>Costo: {fmt(p.costo, cur)} · Plazo: {p.plazo || '—'} meses · Rentabilidad: {p.tasaEsperada}%</div>
                  </div>
                </div>
                <button onClick={() => eliminar(p.id)} style={{ background: 'none', border: 'none', color: C.dim, fontSize: '20px', cursor: 'pointer' }}>×</button>
              </div>
              <div style={{ marginBottom: '16px' }}>
                <div style={{ display: 'flex', justifyContent: 'space-between', fontSize: '13px', marginBottom: '5px' }}>
                  <span style={{ color: C.muted }}>Ahorrado: {fmt(p.ahorroActual, cur)}</span>
                  <span style={{ color: p.color, fontWeight: 600 }}>{ptc}% completado</span>
                </div>
                <div style={{ height: '6px', background: C.border, borderRadius: '3px', overflow: 'hidden' }}>
                  <div style={{ height: '100%', width: `${ptc}%`, background: p.color, borderRadius: '3px' }} />
                </div>
              </div>
              {proy && (
                <div>
                  <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr 1fr', gap: '10px', marginBottom: '14px' }}>
                    <div style={{ padding: '12px', background: C.surface, borderRadius: '10px', border: `1px solid ${C.border}` }}>
                      <div style={{ fontSize: '11px', color: C.muted, marginBottom: '5px' }}>Faltante</div>
                      <div style={{ fontSize: '18px', fontWeight: 700, color: C.danger, fontFamily: 'Fraunces' }}>{fmt(proy.faltante, cur)}</div>
                    </div>
                    <div style={{ padding: '12px', background: C.surface, borderRadius: '10px', border: `1px solid ${C.border}` }}>
                      <div style={{ fontSize: '11px', color: C.muted, marginBottom: '5px' }}>Ahorro mensual simple</div>
                      <div style={{ fontSize: '18px', fontWeight: 700, color: C.warning, fontFamily: 'Fraunces' }}>{fmt(proy.ahorroMensualSimple, cur)}</div>
                    </div>
                    <div style={{ padding: '12px', background: C.surface, borderRadius: '10px', border: `1px solid ${p.color}40` }}>
                      <div style={{ fontSize: '11px', color: C.muted, marginBottom: '5px' }}>Con inversión ({p.tasaEsperada}%)</div>
                      <div style={{ fontSize: '18px', fontWeight: 700, color: p.color, fontFamily: 'Fraunces' }}>{fmt(proy.ahorroMensualInv, cur)}</div>
                    </div>
                  </div>
                  <div style={{ fontSize: '13px', color: C.muted, marginBottom: '8px', fontWeight: 500 }}>Escenarios según tasa de ahorro:</div>
                  <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr 1fr', gap: '8px' }}>
                    {proy.escenarios.map(e => (
                      <div key={e.pct} style={{ padding: '10px', background: C.surface, borderRadius: '8px', border: `1px solid ${C.border}`, textAlign: 'center' }}>
                        <div style={{ fontSize: '13px', fontWeight: 600, color: C.accent, marginBottom: '3px' }}>{e.pct}% ingreso</div>
                        <div style={{ fontSize: '12px', color: C.muted }}>{fmt(e.ahorroMens, cur)}/mes</div>
                        <div style={{ fontSize: '11px', color: C.dim, marginTop: '2px' }}>{e.meses < 12 ? `${e.meses} meses` : `${Math.ceil(e.meses / 12)} años`}</div>
                      </div>
                    ))}
                  </div>
                </div>
              )}
            </Tarjeta>
          );
        })}
      </div>
      {mostrar && (
        <div style={{ position: 'fixed', inset: 0, background: 'rgba(0,0,0,0.7)', display: 'flex', alignItems: 'center', justifyContent: 'center', zIndex: 200 }} onClick={e => e.target === e.currentTarget && setMostrar(false)}>
          <Tarjeta style={{ width: '460px', maxWidth: '95vw', padding: '28px', maxHeight: '90vh', overflowY: 'auto' }}>
            <div style={{ fontFamily: 'Fraunces', fontSize: '20px', fontWeight: 600, marginBottom: '18px' }}>Nuevo Proyecto</div>
            <div style={{ display: 'flex', flexDirection: 'column', gap: '12px' }}>
              <div><Etiqueta>Tipo de proyecto</Etiqueta>
                <select value={form.tipoId} onChange={e => setForm(f => ({ ...f, tipoId: e.target.value }))}>
                  {PROYECTOS_TIPOS.map(t => <option key={t.id} value={t.id}>{t.icon} {t.label}</option>)}
                </select>
              </div>
              <div><Etiqueta>Nombre del proyecto (opcional)</Etiqueta><input placeholder="Ej: Casa en Ñuñoa" value={form.nombre} onChange={e => setForm(f => ({ ...f, nombre: e.target.value }))} /></div>
              <div><Etiqueta>Costo total estimado ({cur}) *</Etiqueta><input type="number" placeholder="50000" value={form.costo} onChange={e => setForm(f => ({ ...f, costo: e.target.value }))} /></div>
              <div><Etiqueta>Ahorro actual destinado ({cur})</Etiqueta><input type="number" placeholder="0" value={form.ahorroActual} onChange={e => setForm(f => ({ ...f, ahorroActual: e.target.value }))} /></div>
              <div><Etiqueta>Plazo deseado (meses)</Etiqueta><input type="number" placeholder="24" value={form.plazo} onChange={e => setForm(f => ({ ...f, plazo: e.target.value }))} /></div>
              <div>
                <Etiqueta>Rentabilidad anual esperada: <span style={{ color: C.accent }}>{form.tasaEsperada}%</span></Etiqueta>

              </div>
              <div style={{ display: 'flex', gap: '10px', marginTop: '6px' }}>
                <Btn onClick={agregar} style={{ flex: 1 }} disabled={!form.costo || +form.costo <= 0}>Crear Proyecto</Btn>
                <Btn variant="outline" onClick={() => setMostrar(false)} style={{ flex: 1 }}>Cancelar</Btn>
              </div>
            </div>
          </Tarjeta>
        </div>
      )}
    </div>
  );

/* ═══════════════════════════ CÓMO FINANCIARME ═══════════════════════════ */
function ComoFinanciarme({ perfil }) {
  const [tipoSel, setTipoSel] = useState('hipotecario');
  const [calcHip, setCalcHip] = useState({ valorProp: '', pie: '20', plazo: '20', tasa: '3.5' });
  const cur = perfil.moneda || 'USD';

  const calcCuota = (v, pie, plazo, tasa) => {
    const prestamo = v * (1 - pie / 100);
    const r = (tasa / 100) / 12, n = plazo * 12;
    if (r === 0) return prestamo / n;
    return prestamo * (r * Math.pow(1 + r, n)) / (Math.pow(1 + r, n) - 1);
  };

  const cuota = calcHip.valorProp && +calcHip.valorProp > 0 ? Math.round(calcCuota(+calcHip.valorProp, +calcHip.pie, +calcHip.plazo, +calcHip.tasa)) : 0;
  const prestamo = calcHip.valorProp ? Math.round(+calcHip.valorProp * (1 - +calcHip.pie / 100)) : 0;
  const pieMonto = calcHip.valorProp ? Math.round(+calcHip.valorProp * (+calcHip.pie / 100)) : 0;
  const ingNecesario = cuota > 0 ? Math.round(cuota / 0.25) : 0;
  const puedeAplicar = (+perfil.ingreso || 0) >= ingNecesario;

  const tipos = [
    { id: 'hipotecario', icon: '🏠', label: 'Crédito Hipotecario' },
    { id: 'automotriz', icon: '🚗', label: 'Crédito Automotriz' },
    { id: 'consumo', icon: '💳', label: 'Crédito de Consumo' },

/* ═══════════════════════════ CONFIGURACIÓN ═══════════════════════════ */
function Configuracion({ perfil, setPerfil }) {
  const [borrador, setBorrador] = useState({ ...perfil });
  const [guardado, setGuardado] = useState(false);
  const up = (f, v) => setBorrador(p => ({ ...p, [f]: v }));
  const upG = (f, v) => setBorrador(p => ({ ...p, gastos: { ...p.gastos, [f]: v } }));
  const guardar = async () => {
    setPerfil({ ...borrador });
    const uid = window.currentUser?.uid;
    if (uid && window.guardarPerfil) {
      try { await window.guardarPerfil(uid, borrador); } catch (e) { console.warn(e); }
    }
    setGuardado(true);
    setTimeout(() => setGuardado(false), 2500);
  };
  const Sec = ({ titulo, children }) => (
    <Tarjeta style={{ marginBottom: '14px' }}>
      <div style={{ fontSize: '12px', fontWeight: 500, color: C.accent, marginBottom: '14px', textTransform: 'uppercase', letterSpacing: '1px' }}>{titulo}</div>
      {children}
    </Tarjeta>
  );
  return (
    <div style={{ padding: '28px 32px', maxWidth: '640px', margin: '0 auto' }}>
      <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'flex-start', marginBottom: '26px' }}>
        <div>
          <div style={{ fontFamily: 'Fraunces', fontSize: '26px', fontWeight: 600 }}>Configuración</div>
          <div style={{ color: C.muted, fontSize: '14px', marginTop: '4px' }}>Datos guardados en Firebase bajo tu cuenta</div>
        </div>
        <Btn onClick={guardar} variant={guardado ? 'success' : 'primary'}>{guardado ? '✅ Guardado' : 'Guardar cambios'}</Btn>
      </div>
      <Sec titulo="Datos Personales">
        <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: '11px' }}>
          <div><Etiqueta>Nombre</Etiqueta><input value={borrador.nombre} onChange={e => up('nombre', e.target.value)} /></div>
          <div><Etiqueta>Edad</Etiqueta><input type="number" value={borrador.edad || ''} onChange={e => up('edad', e.target.value)} /></div>
          <div><Etiqueta>País</Etiqueta>
            <select value={borrador.pais} onChange={e => up('pais', e.target.value)}>
              {['Chile', 'Colombia', 'México', 'Perú', 'Argentina', 'Brasil', 'España', 'Otro'].map(c => <option key={c}>{c}</option>)}
            </select>
          </div>
          <div><Etiqueta>Tipo de empleo</Etiqueta>
            <select value={borrador.empleo} onChange={e => up('empleo', e.target.value)}>
              <option value="formal">Asalariado formal</option>
              <option value="entrepreneur">Emprendedor</option>
              <option value="freelance">Freelancer</option>
              <option value="retired">Jubilado</option>

          </div>
        </div>
      </Sec>
      <Sec titulo="Ingresos">
        <div style={{ display: 'grid', gridTemplateColumns: '2fr 1fr', gap: '11px' }}>
          <div><Etiqueta>Ingreso mensual líquido</Etiqueta><input type="number" value={borrador.ingreso || ''} onChange={e => up('ingreso', e.target.value)} /></div>
          <div><Etiqueta>Moneda</Etiqueta>
            <select value={borrador.moneda} onChange={e => up('moneda', e.target.value)}>
              {['CLP', 'USD', 'COP', 'MXN', 'PEN', 'ARS', 'EUR', 'BRL'].map(c => <option key={c}>{c}</option>)}

        <div style={{ marginTop: '11px' }}><Etiqueta>Ingresos adicionales</Etiqueta><input type="number" value={borrador.ingresoAdicional || ''} onChange={e => up('ingresoAdicional', e.target.value)} /></div>
      </Sec>
      <Sec titulo="Gastos Fijos Mensuales">
        <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: '10px' }}>

/* ═══════════════════════════ WIZARD PATRIMONIO ═══════════════════════════ */
function WizardPatrimonio({ perfil, setPerfil, onCompletado }) {
  const [pasoW, setPasoW] = React.useState(0);
  const [borrador, setBorrador] = React.useState(() => ({
    activos: perfil.activos || { cuentasCorrientes: [], depositosPlazo: [], fondosInversion: [], inmuebles: [], vehiculos: [], otros: [] },
    pasivos: perfil.pasivos || { tarjetas: [], creditoHipotecario: null, creditosConsumo: [], deudasEducativas: [], deudasInformales: [] },
  }));

  const upA = (cat, val) => setBorrador(b => ({ ...b, activos: { ...b.activos, [cat]: val } }));
  const upPas = (cat, val) => setBorrador(b => ({ ...b, pasivos: { ...b.pasivos, [cat]: val } }));
  const upHip = (f, v) => setBorrador(b => ({ ...b, pasivos: { ...b.pasivos, creditoHipotecario: { ...(b.pasivos?.creditoHipotecario||{}), [f]: v } } }));

  const act = borrador.activos;
  const pas = borrador.pasivos;
  const sumArr = (arr, key) => (arr||[]).reduce((s, i) => s + (+(i[key]||0)), 0);
  const totalActivos = sumArr(act.cuentasCorrientes,'saldo') + sumArr(act.depositosPlazo,'monto') + sumArr(act.fondosInversion,'monto') + sumArr(act.inmuebles,'valorEstimado') + sumArr(act.vehiculos,'valorEstimado') + sumArr(act.otros,'monto');
  const totalPasivos = sumArr(pas.tarjetas,'deudaActual') + sumArr(pas.creditosConsumo,'saldoDeuda') + sumArr(pas.deudasEducativas,'saldoDeuda') + sumArr(pas.deudasInformales,'monto') + (+(pas.creditoHipotecario?.saldoDeuda||0));

  const finalizar = async () => {
    const uid = window.currentUser?.uid;
    const patrimonio = {
      netWorth: totalActivos - totalPasivos, totalActivos, totalPasivos,
      activos: { ...act, totales: { cuentasCorrientes: sumArr(act.cuentasCorrientes,'saldo'), depositosPlazo: sumArr(act.depositosPlazo,'monto'), fondosInversion: sumArr(act.fondosInversion,'monto'), inmuebles: sumArr(act.inmuebles,'valorEstimado'), vehiculos: sumArr(act.vehiculos,'valorEstimado'), otros: sumArr(act.otros,'monto') } },
      pasivos: { ...pas, totales: { tarjetas: sumArr(pas.tarjetas,'deudaActual'), hipotecario: +(pas.creditoHipotecario?.saldoDeuda||0), consumo: sumArr(pas.creditosConsumo,'saldoDeuda'), educativo: sumArr(pas.deudasEducativas,'saldoDeuda'), informales: sumArr(pas.deudasInformales,'monto') } },
    };
    const perfilActualizado = { ...perfil, ...borrador, patrimonio_completado: true };
    setPerfil(perfilActualizado);
    if (uid) {
      try {
        await window.guardarPatrimonio?.(uid, patrimonio);
        await window.guardarPerfil?.(uid, perfilActualizado);
      } catch (e) { console.warn(e); }
    }
    onCompletado();
  };

  return (
    <div style={{ minHeight: '100vh', background: C.bg, display: 'flex', alignItems: 'center', justifyContent: 'center', padding: '24px' }}>
      <div style={{ position: 'fixed', top: '-100px', right: '-100px', width: '400px', height: '400px', background: `radial-gradient(circle,${C.accentDim} 0%,transparent 70%)`, pointerEvents: 'none' }} />
      <div style={{ width: '100%', maxWidth: '580px', position: 'relative', zIndex: 1 }}>
        <div style={{ textAlign: 'center', marginBottom: '28px' }}>
          <div style={{ fontFamily: 'Fraunces', fontSize: '42px', fontWeight: 700, color: C.accent, letterSpacing: '-2px' }}>FARO</div>
          <div style={{ fontSize: '11px', color: C.muted, letterSpacing: '4px', textTransform: 'uppercase', marginTop: '3px' }}>Completá tu patrimonio</div>
        </div>
        <div style={{ display: 'flex', gap: '4px', marginBottom: '8px' }}>
          {[0,1].map(i => <div key={i} style={{ flex: 1, height: '3px', borderRadius: '2px', background: i <= pasoW ? C.accent : C.border, transition: 'background 0.4s' }} />)}
        </div>
        <div style={{ fontSize: '12px', color: C.muted, marginBottom: '20px', display: 'flex', justifyContent: 'space-between' }}>
          <span>Paso {pasoW + 1} de 2 — {pasoW === 0 ? 'Activos' : 'Pasivos'}</span>
          <span style={{ cursor: 'pointer', color: C.muted, textDecoration: 'underline' }} onClick={onCompletado}>Más tarde</span>
        </div>

        <Tarjeta style={{ padding: '32px' }}>
          {pasoW === 0 && (
            <div style={{ display: 'flex', flexDirection: 'column', gap: '18px' }}>
              <div>
                <div style={{ fontFamily: 'Fraunces', fontSize: '24px', fontWeight: 600 }}>Tus Activos</div>
                <div style={{ color: C.muted, fontSize: '13px', marginTop: '4px' }}>Todo es opcional. Completa lo que tengas a mano.</div>
              </div>
              {totalActivos > 0 && (
                <div style={{ padding: '10px 14px', background: C.accentDim, borderRadius: '8px', fontSize: '13px', color: C.accent, fontWeight: 600 }}>
                  ✅ Total activos: ${totalActivos.toLocaleString('es-CL')} {perfil.moneda}
                </div>
              )}
              <div>
                <Etiqueta>🏦 Cuentas corrientes y de ahorro</Etiqueta>
                <ItemLista items={act.cuentasCorrientes} onChange={v => upA('cuentasCorrientes', v)}
                  campos={[{key:'banco',placeholder:'Banco (ej: BCI)',required:true},{key:'saldo',placeholder:'Saldo actual',type:'number'}]} />
              </div>
              <div>
                <Etiqueta>📅 Depósitos a plazo</Etiqueta>
                <ItemLista items={act.depositosPlazo} onChange={v => upA('depositosPlazo', v)}
                  campos={[{key:'banco',placeholder:'Banco',required:true},{key:'monto',placeholder:'Monto',type:'number'},{key:'vencimiento',placeholder:'Vencimiento'}]} />
              </div>
              <div>
                <Etiqueta>📈 Fondos de inversión (Fintual, Racional, BTG, APV, fondos mutuos)</Etiqueta>
                <ItemLista items={act.fondosInversion} onChange={v => upA('fondosInversion', v)}
                  campos={[{key:'plataforma',placeholder:'Plataforma',required:true},{key:'nombre',placeholder:'Fondo / Portfolio'},{key:'monto',placeholder:'Valor actual',type:'number'}]} />
              </div>
              <div>
                <Etiqueta>🏠 Propiedades / Inmuebles</Etiqueta>
                <ItemLista items={act.inmuebles} onChange={v => upA('inmuebles', v)}
                  campos={[{key:'descripcion',placeholder:'Descripción (ej: Depto Las Condes)',required:true},{key:'valorEstimado',placeholder:'Valor estimado',type:'number'}]} />
              </div>
              <div>
                <Etiqueta>🚗 Vehículos</Etiqueta>

                  campos={[{key:'descripcion',placeholder:'Descripción (ej: Auto 2020)',required:true},{key:'valorEstimado',placeholder:'Valor estimado',type:'number'}]} />
              </div>
              <div>
                <Etiqueta>💼 Otros activos</Etiqueta>
                <ItemLista items={act.otros} onChange={v => upA('otros', v)}
                  campos={[{key:'descripcion',placeholder:'Descripción',required:true},{key:'monto',placeholder:'Valor',type:'number'}]} />
              </div>
            </div>
          )}

          {pasoW === 1 && (
            <div style={{ display: 'flex', flexDirection: 'column', gap: '18px' }}>
              <div>
                <div style={{ fontFamily: 'Fraunces', fontSize: '24px', fontWeight: 600 }}>Tus Pasivos</div>
                <div style={{ color: C.muted, fontSize: '13px', marginTop: '4px' }}>Registra tus deudas para calcular tu patrimonio neto real.</div>
              </div>
              {totalPasivos > 0 && (
                <div style={{ padding: '10px 14px', background: 'rgba(255,107,107,0.08)', border: '1px solid rgba(255,107,107,0.2)', borderRadius: '8px', fontSize: '13px', color: C.danger, fontWeight: 600 }}>

              <div>
                <Etiqueta>💳 Tarjetas de crédito</Etiqueta>

                  <input type="number" placeholder="Saldo deuda" value={pas.creditoHipotecario?.saldoDeuda || ''} onChange={e => upHip('saldoDeuda', e.target.value)} />
